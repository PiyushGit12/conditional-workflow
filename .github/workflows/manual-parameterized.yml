name: Parameterized Manual Workflow

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Application Name"
        required: true
        type: string

      run_validation:
        description: "Run Validation?"
        required: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      validation_status: ${{ steps.validation.outputs.validation_status }}

    steps:
      - name: Display Inputs
        run: |
          echo "Application Name: ${{ github.event.inputs.application_name }}"
          echo "Run Validation: ${{ github.event.inputs.run_validation }}"

      - name: Validate Input
        id: validation
        run: |
          if [ "${{ github.event.inputs.run_validation }}" = "true" ]; then
            echo "Validation Passed"
            echo "validation_status=success" >> $GITHUB_OUTPUT
          else
            echo "Validation Skipped"
            echo "validation_status=skipped" >> $GITHUB_OUTPUT
          fi

  summary:
    needs: validate
    if: needs.validate.outputs.validation_status == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Print Summary
        run: |
          echo "===================================="
          echo "Application : ${{ github.event.inputs.application_name }}"
          echo "Validation  : SUCCESS"
          echo "Workflow completed successfully."
          echo "===================================="
